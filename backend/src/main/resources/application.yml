server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
  tomcat:
    uri-encoding: UTF-8

spring:
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:securevault;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:20971520}
      max-request-size: ${MAX_FILE_SIZE:20971520}

jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}

secure-vault:
  security:
    file-encryption:
      enabled: ${FILE_ENCRYPTION_ENABLED:true}
      key: ${FILE_ENCRYPTION_KEY:}
      dev-key-file: ${FILE_ENCRYPTION_DEV_KEY_FILE:.secure-vault/file-encryption.key}

app:
  file-storage:
    upload-dir: ${FILE_STORAGE_DIR:./data/uploads}
    max-file-size: ${MAX_FILE_SIZE:20971520}
    allowed-extensions: pdf,docx,txt,md,markdown
  chunking:
    chunk-size: ${CHUNK_SIZE:1000}
    overlap-size: ${CHUNK_OVERLAP_SIZE:150}
    min-chunk-size: ${CHUNK_MIN_SIZE:100}
  embedding:
    provider: ${EMBEDDING_PROVIDER:deterministic}
    model: ${EMBEDDING_MODEL:nomic-embed-text}
    dimension: ${EMBEDDING_DIMENSION:768}
    top-k: ${EMBEDDING_TOP_K:5}
    timeout-seconds: ${EMBEDDING_TIMEOUT_SECONDS:30}
    batch-size: ${EMBEDDING_BATCH_SIZE:16}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embeddings-path: ${OLLAMA_EMBEDDINGS_PATH:/api/embeddings}
  rag:
    default-top-k: ${RAG_DEFAULT_TOP_K:5}
    max-top-k: ${RAG_MAX_TOP_K:10}
    max-question-length: ${RAG_MAX_QUESTION_LENGTH:2000}
    max-context-chars: ${RAG_MAX_CONTEXT_CHARS:8000}
    source-preview-length: ${RAG_SOURCE_PREVIEW_LENGTH:220}
  chat:
    provider: ${CHAT_PROVIDER:deterministic}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_CHAT_MODEL:qwen2.5:3b}
      timeout-seconds: ${OLLAMA_CHAT_TIMEOUT_SECONDS:60}
