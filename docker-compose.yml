services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      FILE_STORAGE_DIR: ${FILE_STORAGE_DIR:-/app/data/uploads}
      FILE_ENCRYPTION_ENABLED: ${FILE_ENCRYPTION_ENABLED:-true}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-20971520}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-deterministic}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      EMBEDDING_TOP_K: ${EMBEDDING_TOP_K:-5}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-30}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBEDDINGS_PATH: ${OLLAMA_EMBEDDINGS_PATH:-/api/embeddings}
      RAG_DEFAULT_TOP_K: ${RAG_DEFAULT_TOP_K:-5}
      RAG_MAX_TOP_K: ${RAG_MAX_TOP_K:-10}
      RAG_MAX_QUESTION_LENGTH: ${RAG_MAX_QUESTION_LENGTH:-2000}
      RAG_MAX_CONTEXT_CHARS: ${RAG_MAX_CONTEXT_CHARS:-8000}
      RAG_SOURCE_PREVIEW_LENGTH: ${RAG_SOURCE_PREVIEW_LENGTH:-220}
      CHAT_PROVIDER: ${CHAT_PROVIDER:-deterministic}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen2.5:3b}
      OLLAMA_CHAT_TIMEOUT_SECONDS: ${OLLAMA_CHAT_TIMEOUT_SECONDS:-60}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - uploads:/app/data/uploads

volumes:
  postgres-data:
  uploads:
